services:
  # PostgreSQL Database
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: taskosaur
      POSTGRES_PASSWORD: taskosaur
      POSTGRES_DB: taskosaur
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskosaur"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taskosaur-network

  # Redis for Bull Queue
  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"  
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taskosaur-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_uploads:
    driver: local

networks:
  taskosaur-network:
    driver: bridge
